name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.3"
  GODOT_PROJECT_PATH: godot
  GODOT_BIN: ./godot-bin

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdtoolkit
        run: pip install gdtoolkit==4.*

      - name: Run gdlint
        run: |
          if find ${{ env.GODOT_PROJECT_PATH }} -name "*.gd" -not -path "*/addons/*" | grep -q .; then
            gdlint ${{ env.GODOT_PROJECT_PATH }} --exclude=${{ env.GODOT_PROJECT_PATH }}/addons
          else
            echo "No .gd files yet — skipping lint."
          fi

      - name: Run gdformat (check only)
        run: |
          if find ${{ env.GODOT_PROJECT_PATH }} -name "*.gd" -not -path "*/addons/*" | grep -q .; then
            gdformat --check ${{ env.GODOT_PROJECT_PATH }}
          else
            echo "No .gd files yet — skipping format check."
          fi

  import-check:
    name: Godot import check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot imported files
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GODOT_PROJECT_PATH }}/.godot/imported
          key: godot-import-${{ hashFiles(format('{0}/**', env.GODOT_PROJECT_PATH)) }}
          restore-keys: |
            godot-import-

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Import project (headless)
        run: |
          ./godot --headless --path ${{ env.GODOT_PROJECT_PATH }} --import || true
          # Re-run to surface late errors
          ./godot --headless --path ${{ env.GODOT_PROJECT_PATH }} --import

      - name: Verify no import errors
        run: |
          if [ -f ${{ env.GODOT_PROJECT_PATH }}/.godot/imported/error.log ]; then
            cat ${{ env.GODOT_PROJECT_PATH }}/.godot/imported/error.log
            exit 1
          fi

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [import-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot imported files
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GODOT_PROJECT_PATH }}/.godot/imported
          key: godot-import-${{ hashFiles(format('{0}/**', env.GODOT_PROJECT_PATH)) }}
          restore-keys: |
            godot-import-

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot-bin
          chmod +x godot-bin

      - name: Run test runner
        run: |
          # Импорт нужен перед запуском тестов, чтобы все ресурсы были готовы.
          ./godot-bin --headless --path ${{ env.GODOT_PROJECT_PATH }} --import || true
          ./godot-bin --headless --path ${{ env.GODOT_PROJECT_PATH }} --script res://tests/test_runner.gd

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint workflow files
        run: yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/
