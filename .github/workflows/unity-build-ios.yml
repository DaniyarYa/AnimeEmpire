name: Unity iOS build

on:
  workflow_dispatch:
  push:
    tags:
      - 'unity-v*'

jobs:
  build-ios:
    name: Build iOS (Xcode project)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: unity/Library
          key: Library-AnimeEmpire-iOS-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-AnimeEmpire-iOS-
            Library-AnimeEmpire-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          targetPlatform: iOS
          buildName: AnimeEmpire

      - uses: actions/upload-artifact@v4
        with:
          name: AnimeEmpire-iOS-Xcode
          path: build/iOS
