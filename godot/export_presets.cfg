; ─────────────────────────────────────────────────────────────────────────
; Export presets for Anime Empire
;
; Phase 0 ставит только Android preset.
; iOS preset закомментирован, активируется в Phase 3 (после оформления
; Apple Developer Program). Подробности — docs/todo/01_phase0_preprod.md.
;
; Перед первой сборкой Android требуется:
;   1. Установить Android SDK (через Android Studio)
;   2. Editor → Editor Settings → Export → Android → задать пути к SDK / JDK
;   3. Создать debug keystore:
;        keytool -keyalg RSA -genkeypair -alias androiddebugkey \
;                -keypass android -keystore debug.keystore \
;                -storepass android -dname "CN=Android Debug,O=Android,C=US" \
;                -validity 9999 -deststoretype pkcs12
;   4. Указать путь к keystore в Editor Settings → Export → Android
; ─────────────────────────────────────────────────────────────────────────

[preset.0]

name="Android Debug"
platform="Android"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path=""
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
gradle_build/use_gradle_build=false
gradle_build/gradle_version="8.2"
gradle_build/android_sdk_version=34
gradle_build/min_sdk="21"
gradle_build/target_sdk="34"
architectures/armeabi-v7a=true
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
version/code=1
version/name="0.0.1"
package/unique_name="com.animeempire.game"
package/name="Anime Empire"
package/signed=true
package/app_category=0
package/retain_data_on_uninstall=false
package/exclude_from_recents=false
package/show_in_android_tv=false
package/show_in_app_library=true
package/show_as_launcher_app=false
launcher_icons/main_192x192=""
launcher_icons/adaptive_foreground_432x432=""
launcher_icons/adaptive_background_432x432=""
graphics/opengl_debug=false
xr_features/xr_mode=0
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
user_data_backup/allow=false
command_line/extra_args=""
apk_expansion/enable=false
apk_expansion/SALT=""
apk_expansion/public_key=""
permissions/custom_permissions=PackedStringArray()
permissions/access_network_state=true
permissions/internet=true

