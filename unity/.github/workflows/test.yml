name: Unity tests

on:
  push:
    branches: [main]
    paths:
      - 'unity/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'unity/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    name: Run EditMode and PlayMode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: unity/Library
          key: Library-AnimeEmpire-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-AnimeEmpire-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        id: edit-mode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+AnimeEmpire.Runtime,-AnimeEmpire.Editor,-*.Tests.*'

      - name: Run PlayMode tests
        uses: game-ci/unity-test-runner@v4
        id: play-mode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          testMode: playmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+AnimeEmpire.Runtime,-AnimeEmpire.Editor,-*.Tests.*'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ steps.edit-mode.outputs.artifactsPath }}
            ${{ steps.play-mode.outputs.artifactsPath }}

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: |
            ${{ steps.edit-mode.outputs.coveragePath }}
            ${{ steps.play-mode.outputs.coveragePath }}

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ steps.edit-mode.outputs.coveragePath }}
          fail_ci_if_error: false
